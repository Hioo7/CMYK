name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Docker Buildx ──────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to Docker Hub ───────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # ── 4. Build & push ───────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cmyk-converter:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cmyk-converter:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── 5. Deploy to VPS ──────────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs:     DOCKERHUB_USERNAME,DOCKERHUB_PASSWORD
          script: |
            IMAGE="${DOCKERHUB_USERNAME}/cmyk-converter"

            # Authenticate with Docker Hub
            echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

            # Pull latest image
            docker pull "${IMAGE}:latest"

            # Start new container
            docker stop cmyk-app-new 2>/dev/null || true
            docker rm   cmyk-app-new 2>/dev/null || true
            docker run -d \
              --name cmyk-app-new \
              --restart unless-stopped \
              -p 7000:7000 \
              "${IMAGE}:latest"

            # Wait for it to be healthy, then swap
            sleep 10
            docker stop cmyk-app 2>/dev/null || true
            docker rm   cmyk-app 2>/dev/null || true
            docker rename cmyk-app-new cmyk-app

            # Remove old images to free disk space
            docker image prune -f
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD:    ${{ secrets.DOCKERHUB_PASSWORD }}
