services:
  cmyk-app:
    image: ${DOCKERHUB_USERNAME}/cmyk-converter:latest
    container_name: cmyk-app
    restart: unless-stopped
    ports:
      - "7000:7000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
